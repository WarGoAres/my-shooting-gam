<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斜向拋射射擊小遊戲 - 手機電腦雙支援</title>
    <style>
        body {
            margin: 0;
            background-color: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
            padding: 10px;
            box-sizing: border-box;
        }
        h2 {
            margin: 0 0 5px 0;
            color: #2c3e50;
            font-size: 20px;
        }
        .subtitle {
            margin: 0 0 10px 0;
            color: #7f8c8d;
            font-size: 12px;
            text-align: center;
        }
        #gameCanvas {
            background-color: #ffffff;
            border: 3px solid #34495e;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 100%;
            height: auto;
        }
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 15px;
            background: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
        }
        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4a5568;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #message {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #2c3e50;
            height: 20px;
            text-align: center;
        }
        
        /* 手機虛擬按鍵樣式 */
        .mobile-joystick {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .joy-row {
            display: flex;
            gap: 10px;
        }
        .joy-btn {
            width: 55px;
            height: 55px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .joy-btn:active {
            background-color: #16a085;
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <h2>斜向拋射射擊小遊戲</h2>
    <div class="subtitle">電腦用 WASD 移動 | 手機用下方按鈕移動</div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="controls">
        <div class="control-group">
            <label for="angle">角度 (&theta;): <span id="angleVal">45</span>&deg;</label>
            <input type="range" id="angle" min="0" max="90" value="45">
        </div>
        <div class="control-group">
            <label for="velocity">初速 ($V_0$): <span id="velocityVal">60</span></label>
            <input type="range" id="velocity" min="20" max="100" value="60">
        </div>
        <div class="control-group" style="justify-content: center;">
            <button id="fireBtn">發射大砲！</button>
        </div>
    </div>

    <div class="mobile-joystick">
        <div class="joy-row">
            <button class="joy-btn" id="btnUp">↑</button>
        </div>
        <div class="joy-row">
            <button class="joy-btn" id="btnLeft">←</button>
            <button class="joy-btn" id="btnDown">↓</button>
            <button class="joy-btn" id="btnRight">→</button>
        </div>
    </div>

    <div id="message">擊中右邊的目標 B 吧！</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const angleInput = document.getElementById('angle');
        const velocityInput = document.getElementById('velocity');
        const angleVal = document.getElementById('angleVal');
        const velocityVal = document.getElementById('velocityVal');
        const fireBtn = document.getElementById('fireBtn');
        const message = document.getElementById('message');

        const g = 9.8; 
        const groundY = 330;
        
        const cannonBase = { x: 80, y: groundY };
        const playerA = { offsetX: -55, offsetY: 0 };
        const moveSpeed = 5;

        let targetB = { x: 650, y: groundY };

        let projectile = {
            x: 0, y: 0, v0: 0, angle: 0, t: 0, active: false, trail: []
        };

        const keys = {};

        // 鍵盤監聽
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if(["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(e.key)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // 手機按鈕狀態監聽
        const touchStates = { up: false, down: false, left: false, right: false };
        
        function bindTouch(btnId, direction) {
            const btn = document.getElementById(btnId);
            // 支援手機觸控與滑鼠點擊
            const startEvent = 'ontouchstart' in window ? 'touchstart' : 'mousedown';
            const endEvent = 'ontouchstyle' in window ? 'touchend' : 'mouseup';
            
            btn.addEventListener(startEvent, (e) => {
                e.preventDefault();
                touchStates[direction] = true;
            });
            btn.addEventListener(endEvent, (e) => {
                e.preventDefault();
                touchStates[direction] = false;
            });
            btn.addEventListener('mouseleave', () => touchStates[direction] = false);
        }

        bindTouch('btnUp', 'up');
        bindTouch('btnDown', 'down');
        bindTouch('btnLeft', 'left');
        bindTouch('btnRight', 'right');

        angleInput.oninput = () => angleVal.innerText = angleInput.value;
        velocityInput.oninput = () => velocityVal.innerText = velocityInput.value;

        function resetTarget() {
            targetB.x = Math.floor(Math.random() * (740 - 450) + 450); 
        }

        function handleMovement() {
            // 左右移動 (支援鍵盤與手機按鈕)
            if (keys['a'] || keys['arrowleft'] || touchStates['left']) {
                if (cannonBase.x > 30) cannonBase.x -= moveSpeed;
            }
            if (keys['d'] || keys['arrowright'] || touchStates['right']) {
                if (cannonBase.x < 350) cannonBase.x += moveSpeed;
            }
            // 上下移動 (支援鍵盤與手機按鈕)
            if (keys['w'] || keys['arrowup'] || touchStates['up']) {
                if (playerA.offsetY > -100) playerA.offsetY -= moveSpeed;
            }
            if (keys['s'] || keys['arrowdown'] || touchStates['down']) {
                if (playerA.offsetY < 0) playerA.offsetY += moveSpeed;
            }
        }

        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 地面
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.strokeStyle = '#34495e';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 2. 軌跡虛線
            if (projectile.trail.length > 1) {
                ctx.beginPath();
                ctx.setLineDash([6, 6]);
                ctx.strokeStyle = '#bdc3c7';
                ctx.moveTo(projectile.trail[0].x, projectile.trail[0].y);
                for (let i = 1; i < projectile.trail.length; i++) {
                    ctx.lineTo(projectile.trail[i].x, projectile.trail[i].y);
                }
                ctx.stroke();
                ctx.setLineDash([]); 
            }

            // 3. 大砲底座與砲管
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(cannonBase.x - 12, groundY - 12, 24, 12); 
            
            ctx.save();
            ctx.translate(cannonBase.x, groundY - 12);
            const currentRad = -angleInput.value * Math.PI / 180;
            ctx.rotate(currentRad);
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, -6, 35, 12); 
            ctx.restore();

            // 4. 玩家 A
            const curAx = cannonBase.x + playerA.offsetX;
            const curAy = groundY + playerA.offsetY;

            ctx.strokeStyle = '#2980b9';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(curAx, curAy - 50, 10, 0, Math.PI * 2); 
            ctx.moveTo(curAx, curAy - 40); ctx.lineTo(curAx, curAy - 15); 
            ctx.moveTo(curAx, curAy - 30); ctx.lineTo(curAx + 20, curAy - 35); 
            ctx.moveTo(curAx, curAy - 15); ctx.lineTo(curAx - 10, curAy); 
            ctx.moveTo(curAx, curAy - 15); ctx.lineTo(curAx + 10, curAy); 
            ctx.stroke();
            
            ctx.fillStyle = '#2980b9';
            ctx.font = 'bold 16px Arial';
            ctx.fillText("A", curAx - 5, curAy - 68);

            // 5. 目標 B
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(targetB.x, groundY - 50, 10, 0, Math.PI * 2); 
            ctx.moveTo(targetB.x, groundY - 40); ctx.lineTo(targetB.x, groundY - 15); 
            ctx.moveTo(targetB.x, groundY - 30); ctx.lineTo(targetB.x - 10, groundY - 25); 
            ctx.moveTo(targetB.x, groundY - 15); ctx.lineTo(targetB.x - 10, groundY); 
            ctx.moveTo(targetB.x, groundY - 15); ctx.lineTo(targetB.x + 10, groundY); 
            ctx.stroke();
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 16px Arial';
            ctx.fillText("B", targetB.x - 5, groundY - 68);

            // 6. 砲彈
            if (projectile.active) {
                ctx.beginPath();
                ctx.arc(projectile.x, projectile.y, 7, 0, Math.PI * 2);
                ctx.fillStyle = '#d35400';
                ctx.fill();
            }
        }

        fireBtn.onclick = () => {
            if (projectile.active) return;

            const theta = angleInput.value * Math.PI / 180;
            const v0 = velocityInput.value;

            projectile.x = cannonBase.x;
            projectile.y = groundY - 12;
            projectile.startX = cannonBase.x; 
            projectile.v0 = v0;
            projectile.angle = theta;
            projectile.t = 0;
            projectile.active = true;
            projectile.trail = [];
            
            message.innerText = "💥 🚀 砲彈飛行中...";
            fireBtn.disabled = true;
            
            updatePhysics();
        };

        function updatePhysics() {
            if (!projectile.active) return;

            projectile.t += 0.16; 
            const t = projectile.t;
            const v0 = projectile.v0;
            const theta = projectile.angle;

            const deltaX = v0 * Math.cos(theta) * t;
            const deltaY = (v0 * Math.sin(theta) * t) - (0.5 * g * t * t);

            projectile.x = projectile.startX + deltaX;
            projectile.y = (groundY - 12) - deltaY;

            projectile.trail.push({ x: projectile.x, y: projectile.y });

            const distX = projectile.x - targetB.x;
            const distY = projectile.y - (groundY - 30); 
            const distance = Math.sqrt(distX * distX + distY * distY);

            if (distance < 28) {
                message.innerHTML = "🎉 <span style='color:green;'>完美擊中目標 B！太強了！</span>";
                projectile.active = false;
                fireBtn.disabled = false;
                setTimeout(() => {
                    resetTarget();
                    message.innerText = "目標已重置，再試一次吧！";
                }, 1800);
                return;
            }

            if (projectile.y >= groundY || projectile.x > canvas.width || projectile.x < 0) {
                message.innerHTML = "❌ <span style='color:red;'>落空了！調整位置、角度再試一次。</span>";
                projectile.active = false;
                fireBtn.disabled = false;
                return;
            }
        }

        resetTarget();
        
        setInterval(() => {
            handleMovement();
            drawScene();
        }, 30);
    </script>
</body>
</html>
