<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斜向拋射射擊小遊戲 - 角色可移動版</title>
    <style>
        body {
            margin: 0;
            background-color: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }
        h2 {
            margin: 0 0 5px 0;
            color: #2c3e50;
        }
        .subtitle {
            margin: 0 0 20px 0;
            color: #7f8c8d;
            font-size: 14px;
        }
        #gameCanvas {
            background-color: #ffffff;
            border: 3px solid #34495e;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 25px;
            background: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
        }
        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4a5568;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        button {
            padding: 10px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #message {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 500;
            color: #2c3e50;
            height: 24px;
        }
    </style>
</head>
<body>

    <h2>斜向拋射射擊小遊戲</h2>
    <div class="subtitle">使用鍵盤 WASD 或 方向鍵 移動角色 A | 公式：x = V₀cosθ·t, y = V₀sinθ·t - ½gt²</div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="controls">
        <div class="control-group">
            <label for="angle">角度 (&theta;): <span id="angleVal">45</span>&deg;</label>
            <input type="range" id="angle" min="0" max="90" value="45">
        </div>
        <div class="control-group">
            <label for="velocity">初速 ($V_0$): <span id="velocityVal">60</span></label>
            <input type="range" id="velocity" min="20" max="100" value="60">
        </div>
        <div class="control-group" style="justify-content: center;">
            <button id="fireBtn">發射大砲！</button>
        </div>
    </div>

    <div id="message">使用鍵盤 WASD 移動角色 A，調整角度與初速，擊中右邊的目標 B 吧！</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const angleInput = document.getElementById('angle');
        const velocityInput = document.getElementById('velocity');
        const angleVal = document.getElementById('angleVal');
        const velocityVal = document.getElementById('velocityVal');
        const fireBtn = document.getElementById('fireBtn');
        const message = document.getElementById('message');

        const g = 9.8; 
        const groundY = 330;
        
        // 核心修改：定義大砲的基準點
        const cannonBase = { x: 80, y: groundY };
        
        // 核心修改：角色 A 的位置初始值（相對於大砲基準點偏左）
        const playerA = { offsetX: -55, offsetY: 0 };
        const moveSpeed = 5; // 移動速度

        let targetB = { x: 650, y: groundY };

        let projectile = {
            x: 0, y: 0, v0: 0, angle: 0, t: 0, active: false, trail: []
        };

        // 鍵盤狀態紀錄
        const keys = {};

        // 監聽鍵盤按下與放開
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            // 防止瀏覽器按方向鍵時網頁跟著滾動
            if(["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(e.key)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        angleInput.oninput = () => angleVal.innerText = angleInput.value;
        velocityInput.oninput = () => velocityVal.innerText = velocityInput.value;

        function resetTarget() {
            targetB.x = Math.floor(Math.random() * (740 - 450) + 450); 
        }

        // 處理角色與大砲移動邏輯
        function handleMovement() {
            // 左右移動 (A / D 或 左右方向鍵)
            if (keys['a'] || keys['arrowleft']) {
                if (cannonBase.x > 30) cannonBase.x -= moveSpeed;
            }
            if (keys['d'] || keys['arrowright']) {
                if (cannonBase.x < 350) cannonBase.x += moveSpeed; // 限制最遠只能走到畫面中間偏左
            }
            // 上下移動 (W / S 或 上下方向鍵)
            if (keys['w'] || keys['arrowup']) {
                if (playerA.offsetY > -100) playerA.offsetY -= moveSpeed; // 限制往上跳/飛的高度
            }
            if (keys['s'] || keys['arrowdown']) {
                if (playerA.offsetY < 0) playerA.offsetY += moveSpeed; // 回到地面
            }
        }

        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 地面
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.strokeStyle = '#34495e';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 2. 軌跡虛線
            if (projectile.trail.length > 1) {
                ctx.beginPath();
                ctx.setLineDash([6, 6]);
                ctx.strokeStyle = '#bdc3c7';
                ctx.moveTo(projectile.trail[0].x, projectile.trail[0].y);
                for (let i = 1; i < projectile.trail.length; i++) {
                    ctx.lineTo(projectile.trail[i].x, projectile.trail[i].y);
                }
                ctx.stroke();
                ctx.setLineDash([]); 
            }

            // 3. 大砲底座與砲管（隨著 cannonBase 位置改變）
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(cannonBase.x - 12, groundY - 12, 24, 12); 
            
            ctx.save();
            ctx.translate(cannonBase.x, groundY - 12);
            const currentRad = -angleInput.value * Math.PI / 180;
            ctx.rotate(currentRad);
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, -6, 35, 12); 
            ctx.restore();

            // 4. 玩家 A（位置會隨著移動加成改變，包含垂直和水平位移）
            const curAx = cannonBase.x + playerA.offsetX;
            const curAy = groundY + playerA.offsetY;

            ctx.strokeStyle = '#2980b9';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(curAx, curAy - 50, 10, 0, Math.PI * 2); 
            ctx.moveTo(curAx, curAy - 40); ctx.lineTo(curAx, curAy - 15); 
            ctx.moveTo(curAx, curAy - 30); ctx.lineTo(curAx + 20, curAy - 35); // 伸出手推大砲的感覺
            ctx.moveTo(curAx, curAy - 15); ctx.lineTo(curAx - 10, curAy); 
            ctx.moveTo(curAx, curAy - 15); ctx.lineTo(curAx + 10, curAy); 
            ctx.stroke();
            
            ctx.fillStyle = '#2980b9';
            ctx.font = 'bold 16px Arial';
            ctx.fillText("A", curAx - 5, curAy - 68);

            // 5. 目標 B
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(targetB.x, groundY - 50, 10, 0, Math.PI * 2); 
            ctx.moveTo(targetB.x, groundY - 40); ctx.lineTo(targetB.x, groundY - 15); 
            ctx.moveTo(targetB.x, groundY - 30); ctx.lineTo(targetB.x - 10, groundY - 25); 
            ctx.moveTo(targetB.x, groundY - 15); ctx.lineTo(targetB.x - 10, groundY); 
            ctx.moveTo(targetB.x, groundY - 15); ctx.lineTo(targetB.x + 10, groundY); 
            ctx.stroke();
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 16px Arial';
            ctx.fillText("B", targetB.x - 5, groundY - 68);

            // 6. 砲彈
            if (projectile.active) {
                ctx.beginPath();
                ctx.arc(projectile.x, projectile.y, 7, 0, Math.PI * 2);
                ctx.fillStyle = '#d35400';
                ctx.fill();
            }
        }

        fireBtn.onclick = () => {
            if (projectile.active) return;

            const theta = angleInput.value * Math.PI / 180;
            const v0 = velocityInput.value;

            // 砲彈從大砲目前的位置發射
            projectile.x = cannonBase.x;
            projectile.y = groundY - 12;
            projectile.startX = cannonBase.x; // 記錄發射起點
            projectile.v0 = v0;
            projectile.angle = theta;
            projectile.t = 0;
            projectile.active = true;
            projectile.trail = [];
            
            message.innerText = "💥 🚀 砲彈飛行中...";
            fireBtn.disabled = true;
            
            updatePhysics();
        };

        function updatePhysics() {
            if (!projectile.active) return;

            projectile.t += 0.16; 
            const t = projectile.t;
            const v0 = projectile.v0;
            const theta = projectile.angle;

            const deltaX = v0 * Math.cos(theta) * t;
            const deltaY = (v0 * Math.sin(theta) * t) - (0.5 * g * t * t);

            projectile.x = projectile.startX + deltaX;
            projectile.y = (groundY - 12) - deltaY;

            projectile.trail.push({ x: projectile.x, y: projectile.y });

            // 碰撞檢測
            const distX = projectile.x - targetB.x;
            const distY = projectile.y - (groundY - 30); 
            const distance = Math.sqrt(distX * distX + distY * distY);

            if (distance < 28) {
                message.innerHTML = "🎉 <span style='color:green;'>完美擊中目標 B！太強了！</span>";
                projectile.active = false;
                fireBtn.disabled = false;
                setTimeout(() => {
                    resetTarget();
                    message.innerText = "目標已重置，再試一次吧！";
                }, 1800);
                return;
            }

            if (projectile.y >= groundY || projectile.x > canvas.width || projectile.x < 0) {
                message.innerHTML = "❌ <span style='color:red;'>落空了！調整位置、角度再試一次。</span>";
                projectile.active = false;
                fireBtn.disabled = false;
                return;
            }

            // 飛行中不重複呼叫 drawScene，由主循環處理
        }

        resetTarget();
        
        // 遊戲主循環：每 30 毫秒同時處理「移動」與「畫面重繪」
        setInterval(() => {
            handleMovement();
            drawScene();
        }, 30);
    </script>
</body>
</html>
